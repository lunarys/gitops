ingress:
  host: demo.test.svc.elda

  external:
    enabled: true
    host: demo.ext.test.svc.elda

image:
  name: ghcr.io/stefanprodan/podinfo
  tag: 6.11.1

service:
  targetPort: 9898


autoscale:
  enabled: false
  preset:
    switch:
      enabled: true
      url: "http://nodered.svc.elda/autoscaler/test-demo-podinfo"


networkpolicy:
  enabled: true
  preset:
    namespaceIsolation: true
    ingress:
      fromNamespace: "traefik-external"

# From https://github.com/stefanprodan/podinfo/blob/902e62b5f3f732885b9b53f5afec3ea4a4f556de/charts/podinfo/templates/deployment.yaml
readinessProbe:
  exec:
    command:
      - podcli
      - check
      - http
      - localhost:9898/readyz

livenessProbe:
  exec:
    command:
      - podcli
      - check
      - http
      - localhost:9898/healthz

extraConfig:
  volumeMounts:
    - name: data
      mountPath: /data
      emptyDir:
        sizeLimit: 100Mi
