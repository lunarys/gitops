nodered:
  ingress:
    host: nodered.svc.elda
    accessControl:
      externalAccessAllowed: false

  image:
    name: nodered/node-red
    tag: 4.1.1
    args: ["--settings", "/configmap/settings.js"]  # store settings outside of the volume /data, which would be the default

  service:
    targetPort: 1880

  env:
    TZ: "Europe/Berlin"

  extraConfig:
    volumeMounts:
      - name: nodered-settings
        configMap: nodered-settings
        mountPath: /configmap
        readOnly: true

  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    tcp:
      port: 1880

  readinessProbe:
    enabled: true
    periodSeconds: 10
    http:
      path: /
      port: 1880

  # better only run one instance of nodered, to avoid parallel executions of flows
  update:
    strategy:
      type: Recreate

  services:
    integration:
      enabled: true
      ports:
        smtp:
          port: 1025
        hmip-binrpc:
          port: 2062
        hmip-xmlrpc:
          port: 2063
      externalIPs:
        - 10.0.4.7

  longhornstorage:
    volumes:
      data:
        size: 500Mi
        variant: retain
        pvName: "pvc-545cca2f-a761-46a1-92aa-65756f8cca54"
        mount:
          path: "/data"

  externalsecrets:
    commonRemoteKey: 230c480a-b2db-4bc4-9186-b38a009fa815
    mount:
      env: true
    fields:
      MY_NODERED_ADMIN_USERNAME:
        storeRefName: bitwarden-login
        remoteProperty: username
      MY_NODERED_ADMIN_PASSWORD:
        storeRefName: bitwarden-login
        remoteProperty: password
      MY_NODERED_CREDENTIAL_SECRET:
        storeRefName: bitwarden-fields
        remoteProperty: credentialSecret

  networkpolicy:
    enabled: true
    preset:
      useChartEndpointSelector: true  # less restrictive policy for nodered vs. mongodb
      ingress:
        fromLocalSubnet: true
        fromNamespaces: 
          - "home-assistant"
          - "keda"
      egress:
        toWorld: true
        toLocalSubnet: true
        toNetworkLabels:
          - custom.network/postgresdb
        toNamespaces: 
          - home-assistant
          - teamspeak
          - mosquitto
