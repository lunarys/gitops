# Step-CA Configuration ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: step-certificates-config
data:
  # TODO: could set durations for acme provisioner:
  #  "claims": {
  #    "minTLSCertDuration": "24h",
  #    "maxTLSCertDuration": "8760h",  // 1 year
  #    "defaultTLSCertDuration": "2160h"  // 90 days (Let's Encrypt default)
  #  }
  # TODO: requireEAB *could* be enabled for better security, but it would require manual steps to create the EAB credentials for each ACME account
  ca.json: |-
    {
      "root": "/home/step/certs/root_ca.crt",
      "federatedRoots": [],
      "crt": "/home/step/certs/intermediate_ca.crt",
      "key": "/home/step/secrets/intermediate_ca_key",
      "address": ":9000",
      "insecureAddress": "",
      "dnsNames": [
        "step-ca.svc.elda",
        "ca.svc.elda",
        "step-certificates.step-ca.svc.cluster.local"
      ],
      "logger": {
        "format": "json"
      },
      "db": {
        "type": "badgerv2",
        "dataSource": "/home/step/db"
      },
      "authority": {
        "enableAdmin": false,
        "provisioners": [
          {
            "type": "JWK",
            "name": "ju@step-ca.svc.elda",
            "key": {
              "use": "sig",
              "kty": "EC",
              "kid": "-y-J6y25GjFHs2trO3P-WkhFVspDeBu1e6JW5JYNuB4",
              "crv": "P-256",
              "alg": "ES256",
              "x": "FCYCIFmvxYXD9sqH1XX9Suth7CiTdNNnupl4OAPxR4o",
              "y": "UAo1k0ognsVUJ8J8hTRAfTp8Bv3D9IckKhvcLKiF_OU"
