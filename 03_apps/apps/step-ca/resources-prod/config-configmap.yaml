            "name": "elda",
            "forceCN": false,
            "requireEAB": false,
            "challenges": [
              "http-01"
            ]
          }
        ],
        "policy": {
          "x509": {
            "allow": {
              "dns": [
                "*.elda",
                "*.svc.elda",
                "*.test.svc.elda"
              ]
            },
            "allowWildcardNames": false
          }
        }
      },
      "tls": {
        "cipherSuites": [
          "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256",
          "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
        ],
        "minVersion": 1.2,
        "maxVersion": 1.3,
        "renegotiation": false
      }
