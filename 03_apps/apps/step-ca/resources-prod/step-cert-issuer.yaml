apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: step-ca-internal
spec:
  acme:
    server: https://step-certificates.step-ca.svc.cluster.local/acme/elda/directory
    # base64-encoded root CA PEM from certs-configmap.yaml root_ca.crt
    # generate with: 
    #   - kubectl get cm step-certificates-certs -n step-ca -o jsonpath='{.data.root_ca\.crt}' | base64 -w0
    #  or
    #   -  yq '.data."root_ca.crt"' resources/certs-configmap.yaml | base64 -w0
    caBundle: ""
    privateKeySecretRef:
      name: step-ca-acme-account-key
    solvers:
      - http01: # https://cert-manager.io/docs/configuration/acme/http01/
          ingress:
            ingressClassName: traefik
            #ingressTemplate:
            #  metadata:
            #    annotations:
            #      # TODO: does not allow access from within the cluster...
            #      traefik.ingress.kubernetes.io/router.middlewares: "traefik-common-internal-access-allowlist@kubernetescrd"
