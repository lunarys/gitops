secrets:
  crowdsec-secrets:
    fields:
      # Must match the key in traefik/resources/crowdsec-bouncer-key.yaml
      bouncer_api_key:
        storeRefName: bitwarden-fields
        remoteProperty: bouncer_key
      enroll_key:
        storeRefName: bitwarden-fields
        remoteProperty: enroll_key
      registration_token:
        storeRefName: bitwarden-fields
        remoteProperty: registration_key
      cs_lapi_secret:
        storeRefName: bitwarden-fields
        remoteProperty: cs_lapi_secret
      web_ui_user:
        storeRefName: bitwarden-login
        remoteProperty: username
      web_ui_password:
        storeRefName: bitwarden-login
        remoteProperty: password
