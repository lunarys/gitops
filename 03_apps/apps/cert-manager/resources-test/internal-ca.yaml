# Derived from the real internal CA issuer in `apps/step-ca/resources-prod/step-cert-issuer.yaml`
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: step-ca-internal
spec:
  acme:
    server: https://step-ca.svc.elda/acme/elda/directory
    caBundle: ""
    privateKeySecretRef:
      name: step-ca-acme-account-key-internal
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
