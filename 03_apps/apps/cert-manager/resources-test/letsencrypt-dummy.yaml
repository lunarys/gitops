# PLEASE NOTE: These issuers are dummy issuers to replace let's encrypt
#  for my internal testing environment that is not exposed to the internet.
#  The names are kept the same as the real issuers in production to avoid having to change.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://step-ca.svc.elda/acme/elda/directory
    caBundle: ""
    privateKeySecretRef:
      name: step-ca-acme-account-key-letsencrypt-dummy-staging
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://step-ca.svc.elda/acme/elda/directory
    caBundle: ""
    privateKeySecretRef:
      name: step-ca-acme-account-key-letsencrypt-dummy-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
