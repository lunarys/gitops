global:
  checkNewVersion: false
  sendAnonymousUsage: false

ingress:
  enabled: false  # dashboard disabled in production; enabled in values-test.yaml
  host: ""

traefik:
  deployment: 
    replicas: 2

  ports:
    traefik:
      expose:
        default: false  # API port not exposed via Service in production
    web:
      http:
        middlewares:
          - "traefik-common-internal-access-allowlist-with-cluster@kubernetescrd"
    websecure:
      http:
        middlewares:
          - "traefik-common-internal-access-allowlist-with-cluster@kubernetescrd"

  service:
    labels:
      custom.network/lb-pool: static
    annotations:
      lbipam.cilium.io/ips: "10.0.4.200"
    spec: 
      allocateLoadBalancerNodePorts: false

  ingressRoute:
    dashboard:
      enabled: false

  api:
    dashboard: false  # enabled in values-test.yaml
    insecure: false

  providers:
    kubernetesCRD:
      # this is required to configure traefik based on its crds, e.g. also Middlewares
      enabled: true

    kubernetesIngress:
      enabled: true
      ingressClass: traefik
      publishedService:
        enabled: true  # required for argo to not show ingresses as progressing

  log:
    level: INFO
    format: json
    
  accessLog:
    enabled: true
    format: json      

autoscale:
  enabled: false
