ingress:
  enabled: false  # dashboard disabled in production; enabled in values-test.yaml
  host: ""

traefik:
  deployment: 
    replicas: 2

  ports:
    traefik:
      expose:
        default: false  # API port not exposed via Service in production
    web:
      http:
        middlewares:
          - "traefik-common-internal-access-allowlist@kubernetescrd"
    websecure:
      http:
        middlewares:
          - "traefik-common-internal-access-allowlist@kubernetescrd"


  ingressRoute:
    dashboard:
      enabled: false

  api:
    dashboard: false  # enabled in values-test.yaml
    insecure: false

  providers:
    kubernetesCRD:
      # this is required to configure traefik based on its crds, e.g. also Middlewares
      enabled: true

    kubernetesIngress:
      enabled: true
      publishedService:
        enabled: true  # required for argo to not show ingresses as progressing

  logs:
    access:
      enabled: true
    general:
      level: INFO

autoscale:
  enabled: false
