apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: common-security-headers
spec:
  headers:
    # helps prevent clickjacking by disallowing your site to be loaded inside iframes from other origins
    frameDeny: true
    customFrameOptionsValue: "SAMEORIGIN"
    # Prevent MIME-type sniffing
    contentTypeNosniff: true
    # Legacy XSS protection for older browsers
    browserXssFilter: true
    # HSTS: require HTTPS for 1 year, eligible for preload list (don't submit unless intended)
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    # Disable browser features not needed by most self-hosted apps
    permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()"
    # Suppress server fingerprinting headers
    customResponseHeaders:
      Server: ""
      X-Powered-By: ""
