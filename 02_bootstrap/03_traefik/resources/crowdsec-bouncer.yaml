apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: common-crowdsec-bouncer
spec:
  plugin:
    # https://plugins.traefik.io/plugins/6335346ca4caa9ddeffda116/crowdsec-bouncer-traefik-plugin
    crowdsec-bouncer-traefik-plugin:
      enabled: true
      crowdsecLapiScheme: http
      crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
      crowdsecLapiKey: /mnt/crowdsec/api_key
      cacheBannedIP: true

      crowdsecAppsecEnabled: true
      crowdsecAppsecHost: crowdsec-appsec-service.crowdsec.svc.cluster.local:7422
      crowdsecAppsecFailureBlock: true
      crowdsecAppsecUnreachableBlock: true

      #logLevel: info
      #logFormat: json

# https://github.com/wussh/crowdsec
# https://github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin