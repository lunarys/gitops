ingress:
  enabled: false  # dashboard disabled in production; enabled in values-test.yaml
  host: ""

traefik:
  deployment: 
    replicas: 2
    podLabels:
      custom.network/external-ingress: egress

  ingressClass:
    isDefaultClass: false
    name: traefik-external

  providers:
    kubernetesIngress:
      ingressClass: traefik-external

  experimental:
    plugins:
      crowdsec-bouncer-traefik-plugin:
        moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
        version: v1.5.1
      geoblock:
        moduleName: "github.com/PascalMinder/geoblock"
        version: v0.3.7  # TODO: update mechanism

  volumes:
    - name: crowdsec-bouncer-key
      mountPath: /mnt/crowdsec
      type: secret

  service:
    spec: 
      allocateLoadBalancerNodePorts: true
    annotations:
      lbipam.cilium.io/ips: "10.0.4.201"

  ports:
    web:
      nodePort: 31255
      http:
        middlewares:
          - "traefik-common-rate-limit@kubernetescrd"
          - "traefik-common-crowdsec-bouncer@kubernetescrd"
          - "traefik-common-region-allowlist@kubernetescrd" # deliberately set geoblock after crowdsec to observe what crowdsec is doing
          - "traefik-common-security-headers@kubernetescrd"
    websecure:
      nodePort: 31060
      http:
        middlewares:
          - "traefik-common-rate-limit@kubernetescrd"
          - "traefik-common-crowdsec-bouncer@kubernetescrd"
          - "traefik-common-region-allowlist@kubernetescrd"
          - "traefik-common-security-headers@kubernetescrd"
