ingress:
  enabled: false  # dashboard disabled in production; enabled in values-test.yaml
  host: ""

traefik:
  deployment: 
    replicas: 2
    podLabels:
      custom.network/external-ingress: egress

  ingressClass:
    isDefaultClass: false
    name: traefik-external

  providers:
    kubernetesIngress:
      ingressClass: traefik-external

  experimental:
    plugins:
      crowdsec-bouncer-traefik-plugin:
        moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
        version: v1.5.1

  volumes:
    - name: crowdsec-bouncer-key
      mountPath: /mnt/crowdsec
      type: secret

  ports:
    web:
      http:
        middlewares:
          #- "traefik-common-security-headers@kubernetescrd"
          - "traefik-common-crowdsec-bouncer@kubernetescrd"
    websecure:
      http:
        middlewares:
          #- "traefik-common-security-headers@kubernetescrd"
          - "traefik-common-crowdsec-bouncer@kubernetescrd"
