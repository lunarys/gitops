secrets:
  # Same Bitwarden remoteKey as crowdsec/secrets.yaml -> crowdsec-secrets.bouncer_api_key
  # The key is mounted as a file in Traefik and read by the CrowdSec bouncer plugin.
  crowdsec-bouncer-key:
    fields:
      api_key:
        storeRefName: bitwarden-fields
        remoteProperty: bouncer_key