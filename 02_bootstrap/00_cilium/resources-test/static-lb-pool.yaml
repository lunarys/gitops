apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "static-services-pool"
spec:
  serviceSelector:
    matchLabels:
      custom.network/lb-pool: static
  blocks:
    - start: "10.0.6.190"
      stop: "10.0.6.201"
    - start: "fda0:f54f:5876::6:190"
      stop: "fda0:f54f:5876::6:201"