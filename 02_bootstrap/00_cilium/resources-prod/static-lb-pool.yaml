apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "static-services-pool"
spec:
  # Gated: only services the chart labelled with custom.network/lb-pool=static
  # may draw from this pool, so a pinned IP can never be handed to an unrelated service.
  serviceSelector:
    matchLabels:
      custom.network/lb-pool: static
  blocks:
    - start: "10.0.4.2"
      stop: "10.0.4.201"
    - start: "fda0:f54f:5876::4:2"
      stop: "fda0:f54f:5876::4:201"
