# https://docs.k0sproject.io/stable/configuration/
apiVersion: k0s.k0sproject.io/v1beta1
kind: ClusterConfig
metadata:
  name: k0s-cluster
spec:
  #api:
  #  k0sApiPort: 9443
  #  port: 6443
  #installConfig:
  #  users:
  #    etcdUser: etcd
  #    kineUser: kube-apiserver
  #    konnectivityUser: konnectivity-server
  #    kubeAPIserverUser: kube-apiserver
  #    kubeSchedulerUser: kube-scheduler
  #konnectivity:
  #  adminPort: 8133
  #  agentPort: 8132
  network:
    kubeProxy:
      disabled: true
      #mode: iptables
    #kuberouter:
    #  autoMTU: true
    #  mtu: 0
    #  peerRouterASNs: ""
    #  peerRouterIPs: ""
    #podCIDR: 10.244.0.0/16  # no effect due to cilium
    provider: custom  # cilium - https://docs.cilium.io/en/latest/installation/k0s/
    serviceCIDR: 10.96.0.0/12
    dualStack:
      enabled: true
      IPv6podCIDR: fd00::/108  # <-- set via cilium settings, but not allowed to be empty (?)
      IPv6serviceCIDR: fd01::/108
    primaryAddressFamily: IPv4
    nodeLocalLoadBalancing:  # <-- does not work with "single" node cluster, but works with a single controller+worker node 
      enabled: true
      type: EnvoyProxy
  controllerManager:
    extraArgs:
      # Disable the node-ipam controller. Cilium owns IPAM (cluster-pool mode), so the
      # node's .spec.podCIDRs are unused by the datapath. On this dual-stack node they were
      # allocated IPv6-first, but --cluster-cidr is IPv4-first (primaryAddressFamily: IPv4),
      # and node-ipam's RangeAllocator matches families strictly by index -> it tries to fit
      # fd00::/117 into 10.244.0.0/16, the controller fails to init, and the *entire*
      # kube-controller-manager crash-loops (taking down ReplicaSet, EndpointSlice, etc.).
      # Surfaced by the k0s v1.36.1 upgrade.
      allocate-node-cidrs: "false"
  # Removed and replaced with Pod Security Standards: https://docs.k0sproject.io/stable/podsecurity/
  #podSecurityPolicy:
  #  defaultPolicy: 00-k0s-privileged
  storage:
    type: etcd
  telemetry:
    enabled: false
